<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Álbum 3 Reyes Mundial</title>
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=1' +
        (l.search ? '&q=' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
